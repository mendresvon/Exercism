name: Auto-merge Exercism PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  automerge:
    runs-on: ubuntu-latest
    # Only run this if the PR is from the official Exercism bot
    if: github.actor == 'exercism-bot'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge for Exercism PRs
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
