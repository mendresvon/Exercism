name: Auto-merge Exercism PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  automerge:
    runs-on: ubuntu-latest
    # This checks if the name contains the bot name, making it more robust
    if: contains(github.actor, 'exercism-solutions-syncer')
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge for Exercism PRs
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
